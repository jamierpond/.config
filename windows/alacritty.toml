# Alacritty — Windows. Imported by %APPDATA%\alacritty\alacritty.toml (stub
# written by windows/setup.ps1). Rose-pine to match psmux/tmux.

[terminal.shell]
program = "C:/Program Files/Git/bin/bash.exe"
args = ["-l"]

[window]
padding = { x = 8, y = 8 }
opacity = 0.97
decorations = "full"

[font]
size = 11.5
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }

[cursor.style]
shape = "Block"
blinking = "Off"

# Rose Pine
[colors.primary]
background = "#191724"
foreground = "#e0def4"

[colors.cursor]
text = "#e0def4"
cursor = "#524f67"

[colors.selection]
text = "#e0def4"
background = "#403d52"

[colors.normal]
black = "#26233a"
red = "#eb6f92"
green = "#31748f"
yellow = "#f6c177"
blue = "#9ccfd8"
magenta = "#c4a7e7"
cyan = "#ebbcba"
white = "#e0def4"

[colors.bright]
black = "#6e6a86"
red = "#eb6f92"
green = "#31748f"
yellow = "#f6c177"
blue = "#9ccfd8"
magenta = "#c4a7e7"
cyan = "#ebbcba"
white = "#e0def4"
