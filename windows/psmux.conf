# psmux config — Windows port of tmux/tmux.conf
# Linked to ~/.psmux.conf by windows/setup.ps1

# Shell — Git Bash, same as the SSH default shell
set -g default-shell "C:/Program Files/Git/bin/bash.exe"

# Terminal
set -s escape-time 0
set-window-option -g xterm-keys on
set -sg repeat-time 50

# Prefix
set-option -g prefix C-a
unbind C-b
bind C-a send-prefix

# Status bar — rose-pine palette, transparent bg
set -g status-style 'bg=default fg=#e0def4'
set -g status-interval 5
set -g status-left-length 60
set -g status-right-length 80

# Left: session
set -g status-left '#[fg=#191724,bg=#c4a7e7,bold] #S #[fg=#c4a7e7,bg=default,nobold] '

# Right: HOSTNAME │ time
set -g status-right '\
#[fg=#403d52]│ \
#[fg=#191724,bg=#c4a7e7,bold] #H \
#[fg=#c4a7e7,bg=default,nobold] \
#[fg=#403d52]│ \
#[fg=#6e6a86]%H:%M '

# Window status
set -g window-status-format '#[fg=#6e6a86,bg=default] #I '
set -g window-status-current-format '#[fg=#e0def4,bg=#26233a,bold] #I '
set -g window-status-separator ''
set -g status-justify centre

# Pane borders — active pane is unmistakable
set -g pane-border-style 'fg=#26233a'
set -g pane-active-border-style 'fg=#56526e'
set -g pane-border-lines single
set -g pane-border-indicators colour

# Message/command styling
set -g message-style 'fg=#c4a7e7,bg=#191724'
set -g message-command-style 'fg=#e0def4,bg=#191724'

# Copy mode highlight
set -g mode-style 'fg=#e0def4,bg=#26233a'

# General
bind r source-file ~/.psmux.conf
set -g base-index 1

# Vi mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Clipboard
set -s set-clipboard on

# Vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Pane resizing
bind-key -r -T prefix M-Up    resize-pane -U 5
bind-key -r -T prefix M-Down  resize-pane -D 5
bind-key -r -T prefix M-Left  resize-pane -L 5
bind-key -r -T prefix M-Right resize-pane -R 5
bind-key -r -T prefix C-Up    resize-pane -U
bind-key -r -T prefix C-Down  resize-pane -D
bind-key -r -T prefix C-Left  resize-pane -L
bind-key -r -T prefix C-Right resize-pane -R
bind-key -r -T prefix C-k     resize-pane -U
bind-key -r -T prefix C-j     resize-pane -D
bind-key -r -T prefix C-h     resize-pane -L
bind-key -r -T prefix C-l     resize-pane -R

# New panes/windows open in current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Sessionizer
bind-key -r f new-window "C:/Program Files/Git/bin/bash.exe -lc ~/.config/bin/scripts/tmux-sessionizer"
bind-key -r F new-window "C:/Program Files/Git/bin/bash.exe -lc '~/.config/bin/scripts/tmux-sessionizer ~/.config'"

# Tools — lazygit is the big one
# new-window, not display-popup: psmux popups can't host full TUIs yet
bind-key -r i new-window -c "#{pane_current_path}" "C:/Program Files/Git/bin/bash.exe -lc ~/.config/bin/scripts/lazygit-here"
bind-key -r m display-popup -E "C:/Program Files/Git/bin/bash.exe"
bind-key -r R run-shell "gh repo view --web"

# Quick actions
bind-key -r u send-keys 'cd ..' Enter
bind-key -r n send-keys 'nvim .' Enter
